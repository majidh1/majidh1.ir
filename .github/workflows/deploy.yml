name: Deploy to Plesk

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Validate deploy secrets
        env:
          PLESK_HOST: ${{ secrets.PLESK_HOST }}
          PLESK_USER: ${{ secrets.PLESK_USER }}
          PLESK_PASSWORD: ${{ secrets.PLESK_PASSWORD }}
          PLESK_TARGET: ${{ secrets.PLESK_TARGET }}
        run: |
          test -n "$PLESK_HOST" || (echo "Missing PLESK_HOST secret" && exit 1)
          test -n "$PLESK_USER" || (echo "Missing PLESK_USER secret" && exit 1)
          test -n "$PLESK_PASSWORD" || (echo "Missing PLESK_PASSWORD secret" && exit 1)
          test -n "$PLESK_TARGET" || (echo "Missing PLESK_TARGET secret" && exit 1)
          case "$PLESK_HOST" in
            *://*|*:*)
              echo "PLESK_HOST must be a plain SSH/SFTP hostname like majidh1.ir, not a Plesk panel URL like https://majidh1.ir:8443/"
              exit 1
              ;;
          esac

      - name: Deploy dist to Plesk
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.PLESK_USER }}
          password: ${{ secrets.PLESK_PASSWORD }}
          port: ${{ secrets.PLESK_PORT }}
          source: "dist/*"
          target: ${{ secrets.PLESK_TARGET }}
          strip_components: 1
          overwrite: true
